<!DOCTYPE html>
<html>
<head>
<title>Modern Shop</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<header>
<h1>Modern Store</h1>
<a href="cart.html" class="cart-btn">🛒 Cart (<span id="cart-count">0</span>)</a>
</header>

<div class="container">

<div class="product">
<img src="https://via.placeholder.com/200">
<h3>T Shirt</h3>
<p>₹500</p>
<button onclick="addToCart('T Shirt',500)">Add to Cart</button>
</div>

<div class="product">
<img src="https://via.placeholder.com/200">
<h3>Shoes</h3>
<p>₹1500</p>
<button onclick="addToCart('Shoes',1500)">Add to Cart</button>
</div>

<div class="product">
<img src="https://via.placeholder.com/200">
<h3>Watch</h3>
<p>₹2000</p>
<button onclick="addToCart('Watch',2000)">Add to Cart</button>
</div>

</div>

<script src="script.js"></script>

</body>
</html>
